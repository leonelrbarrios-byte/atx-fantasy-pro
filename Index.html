<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATX Fantasy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 700px;
      margin: 40px auto;
      background: #111827;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 42px;
    }
    p {
      color: #cbd5e1;
      font-size: 20px;
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    button {
      padding: 14px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ATX Fantasy</h1>
    <p>NBA • MLB • CS2 EV Finder</p>
    <div class="buttons">
      <button>+EV Scanner</button>
      <button>Odds</button>
      <button>CS2</button>
      <button>Pricing</button>
    </div>
  </div>
</body>
</html>
